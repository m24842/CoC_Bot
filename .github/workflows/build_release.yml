name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} ${{ matrix.type }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        type: [gui, cli]
        include:
          - os: windows-latest
            os_name: win
          - os: macos-latest
            os_name: mac

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'src/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U -r src/requirements.txt

      - name: Build Project
        run: |
          python .github/workflows/build_release.py --version ${{ github.ref_name }} --${{ matrix.type }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "CoC_Bot-${{ github.ref_name }}-${{ matrix.os_name }}-${{ matrix.type }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
