name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        type: [gui, cli]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Project
        run: |
          python .github/workflows/build_release.py --version ${{ github.ref_name }} --${{ matrix.type }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "CoC_Bot-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.type }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
